pde:
  name: burgers
  domain_x: [-1.0, 1.0]
  domain_t: [0.0, 1.0]
  params:
    nu: 0.00318309

model:
  d_model: 32
  d_hidden: 512
  n_layers: 1
  n_heads: 2
  d_out: 1

sequence:
  k: 5
  dt: 1.0e-4

training:
  epochs_adam: 2000
  epochs_lbfgs: 500
  lr_adam: 1.0e-3
  n_residual: 2601
  n_boundary: 51
  n_initial: 51
  loss_weights:
    residual: 1.0
    bc: 10.0
    ic: 10.0
    data: 0.0

device: cuda
seed: 42
output_dir: runs/burgers/