pde:
  name: burgers
  domain_x: [-1.0, 1.0]
  domain_t: [0.0, 1.0]
  params:
    nu: 0.00318309

model:
  d_model: 128
  n_layers: 4
  d_out: 1
  n_fourier: 64
  sigma: 1.0

sequence:
  k: 1
  dt: 0.0

training:
  epochs_adam: 5000
  epochs_lbfgs: 5000
  lr_adam: 1.0e-3
  n_residual: 2601
  n_boundary: 51
  n_initial: 51
  loss_weights:
    residual: 1.0
    bc: 1.0
    ic: 1.0
    data: 0.0

device: cuda
seed: 42
output_dir: runs/burgers/